services:
  - type: web
    name: vibmon
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_USER
        value: admin
      - key: ADMIN_PASS
        value: vibmon2024
      - key: DB_PATH
        value: /opt/render/project/src/vibmon.db
      - key: UPLOAD_DIR
        value: /opt/render/project/src/uploads
